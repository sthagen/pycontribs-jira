name: cloud

on:
  workflow_call:
    inputs:
      ref:
        type: string
        description: 'Ref (SHA/branch) to run the workflow on'
        required: true
        default: 'main'
    secrets:
      CLOUD_ADMIN:
        required: true
      CLOUD_ADMIN_TOKEN:
        required: true
      CLOUD_USER:
        required: true
      CLOUD_USER_TOKEN:
        required: true
  workflow_dispatch:
    inputs:
      ref:
        type: string
        description: 'Ref (SHA/branch) to run the workflow on'
        required: true
        default: 'main'
jobs:
  test:
    environment: cloud
    name: py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      # Single python version - concurrent runs would fight over
      # the same Jira Cloud sandbox tenant.
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10"]

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}

      - name: Install uv and pin python ${{ matrix.python-version }}
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install bindep system packages (apt)
        run: |
          sudo apt-get update -y
          mapfile -t apt_packages < <(uvx bindep -b -f bindep.txt || true)
          if [ ${#apt_packages[@]} -gt 0 ]; then
            sudo apt-get install -y --no-install-recommends "${apt_packages[@]}"
          fi

      - name: Install tox
        run: uv tool install tox --with tox-uv --with "setuptools>=65.3"

      - name: Test with tox
        # `tr -d .` collapses 3.10 -> 310 since GHA expressions have no string-replace.
        run: tox -e "py$(echo '${{ matrix.python-version }}' | tr -d .)" -- -m allow_on_cloud
        env:
          CI_JIRA_TYPE: CLOUD
          CI_JIRA_CLOUD_ADMIN: ${{ secrets.CLOUD_ADMIN }}
          CI_JIRA_CLOUD_ADMIN_TOKEN: ${{ secrets.CLOUD_ADMIN_TOKEN }}
          CI_JIRA_CLOUD_USER: ${{ secrets.CLOUD_USER }}
          CI_JIRA_CLOUD_USER_TOKEN: ${{ secrets.CLOUD_USER_TOKEN }}

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          # tox writes coverage.xml under .tox/<env>/; codecov's
          # auto-search picks it up from there.
          directory: .tox
          name: ${{ runner.os }}-${{ matrix.python-version }}-Cloud
          fail_ci_if_error: true
