version: 2
updates:
  # `uv` ecosystem bumps both pyproject.toml and uv.lock together.
  - package-ecosystem: uv
    directory: "/"
    schedule:
      day: sunday
      interval: weekly
    labels:
      - dependabot-deps-updates
      - skip-changelog
    groups:
      dependencies:
        patterns:
          - "*"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: daily
    labels:
      - "dependencies"
      - "skip-changelog"
